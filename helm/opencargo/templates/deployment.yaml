apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-opencargo
  labels:
    app: opencargo
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: opencargo
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: opencargo
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: opencargo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/opencargo/config.toml
          ports:
            - name: http
              containerPort: 6789
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/opencargo
              readOnly: true
          env:
            - name: OPENCARGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-opencargo-secret
                  key: admin-password
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-opencargo-data
        - name: config
          configMap:
            name: {{ .Release.Name }}-opencargo-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
