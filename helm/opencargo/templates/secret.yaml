apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-opencargo-secret
  labels:
    app: opencargo
    release: {{ .Release.Name }}
type: Opaque
data:
  admin-password: {{ required "auth.adminPassword is required — set a strong password (e.g. --set auth.adminPassword=...)" .Values.auth.adminPassword | b64enc | quote }}
