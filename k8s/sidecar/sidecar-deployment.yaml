apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-runner-with-cache
  labels:
    app: ci-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ci-runner
  template:
    metadata:
      labels:
        app: ci-runner
    spec:
      containers:
        - name: ci-runner
          image: node:22-alpine
          env:
            - name: npm_config_registry
              value: "http://localhost:6789/npm-all/"
          command: ["sh", "-c", "echo 'CI runner ready' && sleep infinity"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

        - name: opencargo-cache
          image: opencargo:latest
          args: ["--config", "/config/config.toml"]
          ports:
            - containerPort: 6789
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          volumeMounts:
            - name: cache
              mountPath: /data
            - name: sidecar-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 6789
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 6789
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
        - name: sidecar-config
          configMap:
            name: opencargo-sidecar-config
