apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencargo
  labels:
    app: opencargo
spec:
  replicas: 1
  # The PVC is ReadWriteOnce and the app uses SQLite (single writer): Recreate
  # tears down the old pod before starting the new one, so the volume/DB is
  # never held by two pods at once during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: opencargo
  template:
    metadata:
      labels:
        app: opencargo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # The PVC may hold data written by an earlier root-running revision.
        # The hardened runtime user (10001) can't write those root-owned files,
        # so SQLite fails with "attempt to write a readonly database". Re-own
        # the volume once at startup (root + only the CHOWN capability).
        - name: fix-data-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /data"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: opencargo
          # ":latest" is mutable; prefer an immutable tag/digest in production.
          image: ghcr.io/akarasso/opencargo:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          # `--config` is a global flag, so it must come BEFORE the `serve`
          # subcommand (`opencargo --config <path> serve`).
          args:
            - --config
            - /etc/opencargo/config.toml
            - serve
          ports:
            - name: http
              containerPort: 6789
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/opencargo
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opencargo-data
        - name: config
          configMap:
            name: opencargo-config
        - name: tmp
          emptyDir: {}
