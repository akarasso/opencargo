apiVersion: apps/v1
kind: Deployment
metadata:
  name: opencargo
  labels:
    app: opencargo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opencargo
  template:
    metadata:
      labels:
        app: opencargo
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opencargo
          # ":latest" is mutable; prefer an immutable tag/digest in production.
          image: ghcr.io/akarasso/opencargo:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          args:
            - serve
            - --config
            - /etc/opencargo/config.toml
          ports:
            - name: http
              containerPort: 6789
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/opencargo
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: opencargo-data
        - name: config
          configMap:
            name: opencargo-config
        - name: tmp
          emptyDir: {}
