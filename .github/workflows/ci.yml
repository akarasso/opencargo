name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Least privilege for the automatically-provided token. Jobs that need more
# must opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && pnpm install --frozen-lockfile && pnpm build

      - name: Build
        run: cargo build

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      # The pnpm e2e tests shell out to `pnpm`, resolved from PATH (installed above).
      - name: Run tests
        run: cargo test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # RUSTSEC-2023-0071 (rsa "Marvin" timing side-channel) has NO fixed upstream
      # release and reaches us only transitively — ignore it explicitly rather than
      # letting an un-actionable advisory permanently red the pipeline. Everything
      # else must still pass; revisit when `rsa` ships a fix.
      - name: Security audit (RustSec advisory DB)
        run: cargo audit --ignore RUSTSEC-2023-0071

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    # GITHUB_TOKEN needs packages:write to push the image to GHCR.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build (the Dockerfile builds the frontend + Rust release itself) and PUSH:
      # previously the job built `:latest` locally and discarded it, so GHCR
      # `:latest` never tracked main and every deploy needed a manual build.
      # `platforms: linux/amd64` + `provenance: false` publish a single clean
      # manifest — `:latest` resolves to ONE digest instead of an attestation index
      # whose "unknown/unknown" child breaks digest pinning. `:sha-<commit>` is the
      # immutable tag deployments pin to.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ghcr.io/akarasso/opencargo:latest
            ghcr.io/akarasso/opencargo:sha-${{ github.sha }}

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/akarasso/opencargo:sha-${{ github.sha }}
          format: table
          # Report HIGH/CRITICAL but do not fail the build on unfixed CVEs yet.
          # Flip exit-code to '1' once the base image is reliably clean.
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
